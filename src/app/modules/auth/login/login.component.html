<div class="login-container">

    <!-- Fondo animado -->
    <div class="bg-overlay"></div>
    <div class="road-lines">
        <div class="line" *ngFor="let l of [1,2,3,4,5]"></div>
    </div>

    <!-- Tarjeta login -->
    <div class="login-card">

        <!-- Logo -->
        <div class="logo-section">
            <img src="assets/logos/logo_fondo_dark.png" alt="INFRAVIAL" class="logo">
            <p class="logo-sub">TRACKING DE INFRAESTRUCTURA VIAL</p>
        </div>

        <!-- Formulario -->
        <div class="form-section">
            <h2 class="form-title">Iniciar Sesión</h2>

            <div class="form-group">
                <label>Cédula / Documento</label>
                <div class="input-wrapper">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                    </svg>
                    <input
                        type="text"
                        [(ngModel)]="user"
                        placeholder="Ingresa tu cédula"
                        (keyup.enter)="login()"
                    >
                </div>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrapper">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/>
                    </svg>
                    <input
                        [type]="showPass ? 'text' : 'password'"
                        [(ngModel)]="password"
                        placeholder="Ingresa tu contraseña"
                        (keyup.enter)="login()"
                    >
                    <button class="toggle-pass" (click)="showPass = !showPass">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path *ngIf="!showPass" d="M12 4.5C7 4.5 2.7 7.6 1 12c1.7 4.4 6 7.5 11 7.5s9.3-3.1 11-7.5C21.3 7.6 17 4.5 12 4.5zm0 12.5c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z"/>
                            <path *ngIf="showPass" d="M2.1 3.5L1 4.6l3 3C2 9 .7 10.4 0 12c1.7 4.4 6 7.5 11 7.5 1.5 0 3-.3 4.3-.8l3.2 3.2 1.1-1.1L2.1 3.5zm9.9 12c-2.8 0-5-2.2-5-5 0-.8.2-1.6.5-2.3l1.5 1.5c-.1.3-.1.5-.1.8 0 1.7 1.3 3 3 3 .3 0 .5 0 .8-.1l1.5 1.5c-.7.4-1.4.6-2.2.6zm4.9-2.7l-1.4-1.4c.3-.6.5-1.2.5-1.9 0-1.7-1.3-3-3-3-.7 0-1.3.2-1.9.5L9.7 5.6C10.4 5.2 11.2 5 12 5c5 0 9.3 3.1 11 7.5-.6 1.6-1.6 3-2.9 4.1l-1.2-1.8z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="error-msg" *ngIf="error">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
                {{ error }}
            </div>

            <button class="btn-login" (click)="login()" [disabled]="loading">
                <span *ngIf="!loading">Ingresar</span>
                <span *ngIf="loading" class="spinner"></span>
            </button>
        </div>

        <div class="login-card-footer">
            © INFRAVIAL — DESARROLLADOR - WALTER AGUILAR
        </div>
    </div>
</div>
