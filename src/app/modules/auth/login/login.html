<div class="login-container">
    <canvas id="matrix"></canvas>
    <div class="bg-overlay"></div>
    <div class="bg-overlay"></div>

    <div class="login-card">
        <div class="logo-section">
            <img src="logos/logo_fondo_dark.png" alt="INFRAVIAL" class="logo">
            <p class="logo-sub">TRACKING DE INFRAESTRUCTURA VIAL</p>
        </div>

        <div class="form-section">
            <h2 class="form-title">Iniciar Sesión</h2>

            <div class="form-group">
                <label>Cédula / Documento</label>
                <div class="input-wrapper">
                    <input
                        type="text"
                        [(ngModel)]="user"
                        placeholder="Ingresa tu cédula"
                        (keyup.enter)="login()"
                    >
                </div>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrapper">
                    <input
                        [type]="showPass ? 'text' : 'password'"
                        [(ngModel)]="password"
                        placeholder="Ingresa tu contraseña"
                        (keyup.enter)="login()"
                    >
                    <button class="toggle-pass" (click)="showPass = !showPass" type="button">
                        {{ showPass ? '🙈' : '👁️' }}
                    </button>
                </div>
            </div>

            <div class="error-msg" *ngIf="error">
                ⚠️ {{ error }}
            </div>

            <button class="btn-login" (click)="login()" [disabled]="loading">
                <span *ngIf="!loading">Ingresar</span>
                <span *ngIf="loading">Cargando...</span>
            </button>
        </div>

        <div class="login-card-footer">
            © INFRAVIAL — DESARROLLADOR - WALTER AGUILAR
        </div>
    </div>
</div>
